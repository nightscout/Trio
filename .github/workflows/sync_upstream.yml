name: Sync Fork from Upstream

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: 'Upstream branch to sync from'
        required: true
        default: 'dev'
        type: string

env:
  UPSTREAM_REPO: nightscout/Trio
  UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'dev' }}
  TARGET_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Check for changes
        id: check
        run: |
          COUNT=$(git rev-list HEAD..upstream/${{ env.UPSTREAM_BRANCH }} --count)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Backup custom features
        if: steps.check.outputs.count != '0'
        run: |
          mkdir -p /tmp/custom-backup

          # Backup complications
          cp -r "Trio Watch Complication/" /tmp/custom-backup/
          cp -r "FreeAPSWatch WatchKit Extension/" /tmp/custom-backup/ 2>/dev/null || true

          # Backup AI Meal Advisor
          mkdir -p /tmp/custom-backup/MealScan
          cp -r "Trio/Sources/Modules/MealScan/" /tmp/custom-backup/MealScan/Modules/ 2>/dev/null || true
          cp -r "Trio/Sources/Services/MealScan/" /tmp/custom-backup/MealScan/Services/ 2>/dev/null || true
          cp "Trio/Sources/Models/MealScanModels.swift" /tmp/custom-backup/MealScan/ 2>/dev/null || true
          cp "LiveActivity/MealScanWidget.swift" /tmp/custom-backup/MealScan/ 2>/dev/null || true

      - name: Merge upstream
        if: steps.check.outputs.count != '0'
        id: merge
        run: |
          if git merge upstream/${{ env.UPSTREAM_BRANCH }} -m "Merge upstream ${{ env.UPSTREAM_BRANCH }}"; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            git merge --abort
          fi

      - name: Restore custom features
        if: steps.merge.outputs.success == 'true'
        run: |
          # Restore complications
          cp -r /tmp/custom-backup/Trio\ Watch\ Complication/* "Trio Watch Complication/"
          cp -r /tmp/custom-backup/FreeAPSWatch\ WatchKit\ Extension/* "FreeAPSWatch WatchKit Extension/" 2>/dev/null || true

          # Restore AI Meal Advisor
          mkdir -p "Trio/Sources/Modules/MealScan/"
          mkdir -p "Trio/Sources/Services/MealScan/"
          cp -r /tmp/custom-backup/MealScan/Modules/* "Trio/Sources/Modules/MealScan/" 2>/dev/null || true
          cp -r /tmp/custom-backup/MealScan/Services/* "Trio/Sources/Services/MealScan/" 2>/dev/null || true
          cp /tmp/custom-backup/MealScan/MealScanModels.swift "Trio/Sources/Models/" 2>/dev/null || true
          cp /tmp/custom-backup/MealScan/MealScanWidget.swift "LiveActivity/" 2>/dev/null || true

          # Check if there are changes to commit
          if ! git diff --quiet; then
            git add "Trio Watch Complication/" "FreeAPSWatch WatchKit Extension/" \
                    "Trio/Sources/Modules/MealScan/" "Trio/Sources/Services/MealScan/" \
                    "Trio/Sources/Models/MealScanModels.swift" "LiveActivity/MealScanWidget.swift" 2>/dev/null || true
            git commit -m "Restore custom features after upstream sync"
          fi

      - name: Push changes
        if: steps.merge.outputs.success == 'true'
        run: git push origin ${{ env.TARGET_BRANCH }}

      - name: Trigger build
        if: steps.merge.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run "Build Complications Branch" --ref ${{ env.TARGET_BRANCH }}

      - name: Summary
        run: |
          echo "## Sync Result" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.count }}" == "0" ]; then
            echo "Already up to date." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.merge.outputs.success }}" == "true" ]; then
            echo "Synced ${{ steps.check.outputs.count }} commits." >> $GITHUB_STEP_SUMMARY
          else
            echo "Conflicts - manual merge needed." >> $GITHUB_STEP_SUMMARY
          fi
